[advisories]
ignore = []

[bans]
multiple-versions = "warn"
deny = []

[licenses]
# Run as: cargo deny check advisories bans sources licenses
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "ISC",
    "Unicode-DFS-2016",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "CC0-1.0",
    "Zlib",
]
private = { ignore = true }

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-git = [
    "https://github.com/basidiocarp/spore",
]
