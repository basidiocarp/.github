# Ecosystem Dependency Versions
#
# Single source of truth for shared dependency versions across all Rust projects.
# This file is informational — not mechanically enforced — but agents and
# developers should check it before upgrading any shared dependency.
#
# To check for drift:
#   grep -r 'spore.*tag' */Cargo.toml
#   grep -r 'rusqlite' */Cargo.toml

[spore]
version = "0.4.11"
rev = "a3c7f5bf8f4025b7a507f44d68a338244ad2d6e4"
git = "https://github.com/basidiocarp/spore"
consumers = ["mycelium", "hyphae", "rhizome", "stipe", "cortina", "canopy", "volva", "hymenium", "annulus"]
pending = []
note = "All consumers must pin using rev= (immutable) not tag= (mutable)."

[datetime]
crate = "chrono"
version = "0.4"
rationale = "Canonical datetime crate for the ecosystem: already used by spore and hyphae, and lowest-risk to standardize across cross-project timestamps."

[shared-deps]
anyhow = "1"
clap = "4"
chrono = "0.4"       # canonical datetime crate
regex = "1"
rusqlite = "0.39"       # aligned: mycelium, hyphae, canopy, cortina all on 0.39
serde = "1"
serde_json = "1"
thiserror = "2"
toml = "1"              # aligned: spore, hyphae, stipe on 1.1; mycelium on 1
tracing = "0.1"
ulid = "1"
which = "7"

[tools]
# Tool versions: ecosystem-versions.toml is the single authority.
# Stipe doctor pins must match these values.
# Update this file when a tool is released, then update Stipe pins to match.
mycelium = "0.9.0"
hyphae = "0.12.0"       # 5-crate workspace, version per crate
rhizome = "0.8.0"       # 5-crate workspace, version per crate
canopy = "0.6.0"
cortina = "0.3.0"
stipe = "0.6.0"
volva = "0.2.4"
hymenium = "0.6.0"
annulus = "0.5.5"
cap = "0.11.9"
lamella = "0.5.15"
spore = "0.4.11"

[contracts]
# Active Septa contract generations mirrored from `septa/`.
# These are coordination versions for the contract families, not necessarily the
# literal `schema_version` field encoded in each JSON payload.
degradation-tier = "1.0"
