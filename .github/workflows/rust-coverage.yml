name: Rust Coverage (Reusable)

on:
  workflow_call:
    inputs:
      rust-toolchain:
        description: 'Rust toolchain to use'
        type: string
        default: stable
      threshold:
        description: 'Minimum coverage percentage'
        type: number
        default: 60

permissions:
  contents: read

jobs:
  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ inputs.rust-toolchain }}
          components: llvm-tools-preview
      - uses: actions/cache@v5.0.4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-coverage-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-coverage-

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2.69.7
        with:
          tool: cargo-llvm-cov

      - name: Generate LCOV report
        run: cargo llvm-cov --all-features --workspace --lcov --output-path lcov.info

      - name: Generate JSON report
        run: cargo llvm-cov --all-features --workspace --json --output-path coverage.json

      - name: Check threshold
        run: |
          COVERAGE=$(python3 -c "
          import json
          with open('coverage.json') as f:
              data = json.load(f)
          totals = data.get('data', [{}])[0].get('totals', {}).get('lines', {})
          print(f\"{totals.get('percent', 0):.1f}\")
          ")
          echo "Coverage: ${COVERAGE}%"
          python3 -c "assert float('${COVERAGE}') >= ${{ inputs.threshold }}, f'Coverage {${COVERAGE}}% below threshold ${{ inputs.threshold }}%'"

      - name: Upload coverage
        uses: actions/upload-artifact@v7.0.1
        with:
          name: coverage-report
          path: lcov.info
          retention-days: 30
