name: Rust CI (Reusable)

on:
  workflow_call:
    inputs:
      rust-toolchain:
        description: 'Rust toolchain to use'
        type: string
        default: stable
      workspace:
        description: 'Use --workspace flag'
        type: boolean
        default: false
      no-default-features:
        description: 'Also test with --no-default-features'
        type: boolean
        default: false
      audit:
        description: 'Run cargo audit'
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  check:
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ inputs.rust-toolchain }}
      - uses: actions/cache@v5.0.4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Format check
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy ${{ inputs.workspace && '--workspace' || '' }} -- -D warnings

      - name: Test
        run: cargo test ${{ inputs.workspace && '--workspace' || '' }}

      - name: Test (no default features)
        if: inputs.no-default-features
        run: cargo test ${{ inputs.workspace && '--workspace' || '' }} --no-default-features

      - name: Build release
        run: cargo build --release ${{ inputs.workspace && '--workspace' || '' }}

  audit:
    if: inputs.audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ inputs.rust-toolchain }}
      - name: Install cargo-audit
        uses: taiki-e/install-action@v2.75.18
        with:
          tool: cargo-audit
      - name: Audit dependencies
        run: cargo audit
