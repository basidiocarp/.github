version: 2
updates:
  # GitHub Actions monitoring for the basidiocarp workspace root.
  # Rust repo Cargo monitoring lives in each sub-repo's own .github/dependabot.yml —
  # sub-repos are separate git repositories and their Cargo.toml files are not
  # tracked here, so directory-based Cargo entries in this file have no effect.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "ci(deps):"
    open-pull-requests-limit: 5
