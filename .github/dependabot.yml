version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "ci(deps):"
    open-pull-requests-limit: 5

  # Cargo ecosystem monitoring per Rust repo
  - package-ecosystem: cargo
    directory: /mycelium
    schedule:
      interval: weekly
    commit-message:
      prefix: "deps(mycelium):"
    open-pull-requests-limit: 3

